<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard Rencana Aksi</title>

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.7.1.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:#f3faf5;
margin:0;
padding:30px;
}

.header{
background:linear-gradient(90deg,#16a34a,#22c55e);
color:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

table.dataTable thead{
background:#16a34a;
color:white;
}

.dataTables_wrapper .dataTables_filter input{
border-radius:6px;
border:1px solid #ccc;
padding:5px;
}

@media(max-width:768px){

body{
padding:10px;
}

.header{
font-size:14px;
}

}

</style>

</head>


<body>

<div class="header">
<h2>Dashboard Rencana Aksi Pegawai</h2>
</div>

<div class="card">

<table id="tabel" class="display" style="width:100%">

<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>Jabatan</th>
<th>Rencana Aksi</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>


<script>

let sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSCWi4dvgz8UEIborIqP4QytbQfOM34l_sZrJ1_y5YsrVxPwCfKJ6HBbJ9onzKVjJTdVI1d9WcqANpY/pub?gid=0&single=true&output=csv";

Papa.parse(sheetURL,{

download:true,
header:true,

complete:function(results){

let data=results.data;

data.forEach(row=>{

if(row.Nama){

$("#tabel tbody").append(`
<tr>
<td></td>
<td>${row.Nama}</td>
<td>${row.Jabatan}</td>
<td>${row["Rencana Aksi"]}</td>
</tr>
`)

}

})

let tabel = $('#tabel').DataTable({

pageLength:10,
responsive:true,

columnDefs:[
{
targets:0,
searchable:false,
orderable:false
}
],

order:[[1,'asc']],

language:{
search:"Cari Nama :",
lengthMenu:"Tampilkan _MENU_ data",
info:"Menampilkan _START_ - _END_ dari _TOTAL_ data",
paginate:{
previous:"Prev",
next:"Next"
}
}

})

tabel.on('order.dt search.dt', function () {
tabel.column(0,{search:'applied',order:'applied'}).nodes()
.each(function(cell,i){
cell.innerHTML=i+1;
});
}).draw();

}

})

</script>

</body>

</html>
